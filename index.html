<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テキスト日記</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S27BK7B8XS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S27BK7B8XS');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@17.0.4/marked.min.js"></script>
</head>
<body>

  <header>
    <div class="container">
      <h1>テキスト日記</h1>
      <p class="tagline">日々の記録</p>
    </div>
  </header>

  <nav>
    <a href="#" id="nav-home" class="active" onclick="showPage('home'); return false;">ホーム</a>
    <a href="#" id="nav-about" onclick="showPage('about'); return false;">このサイトについて</a>
  </nav>

  <main class="container">

    <!-- ===== Home: Entry List ===== -->
    <section id="page-home">
      <ul class="entry-list" id="entry-list"></ul>
    </section>

    <!-- ===== Entry Detail ===== -->
    <section id="page-entry" class="hidden">
      <a href="#" class="back-link" onclick="showPage('home'); return false;">日記一覧に戻る</a>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="detail-meta"></div>
          <h1 id="detail-title"></h1>
        </header>
        <div class="entry-body" id="detail-body"></div>
      </article>
    </section>

    <!-- ===== About ===== -->
    <section id="page-about" class="hidden">
      <div class="about-section">
        <h2>このサイトについて</h2>
        <p>
          これは GitHub Pages で公開しているテキスト日記サイトです。
          日常の出来事、考え、気づきを気ままに記録しています。
        </p>
        <p>
          すべての記事はシンプルなテキストで書かれており、
          読みやすさを大切にしています。
        </p>
        <p>
          サイトは静的 HTML / CSS / JavaScript のみで構成されており、
          サーバーサイドの処理は一切使用していません。
        </p>
      </div>
    </section>

  </main>

  <!-- ===== Modal ===== -->
  <div id="entry-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn" aria-label="閉じる">&times;</button>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="modal-meta"></div>
          <h1 id="modal-title"></h1>
        </header>
        <div class="entry-body" id="modal-body"></div>
      </article>
    </div>
  </div>

  <footer>
    <div class="container">
      &copy; 2026 テキスト日記
    </div>
  </footer>

  <script>
    // ===== Loaded diary entries (populated from diary/index.json) =====
    let entries = [];

    // ===== Render tag badges into a container element =====
    function renderTags(container, tags) {
      tags.forEach(tag => {
        const tagSpan = document.createElement('span');
        tagSpan.className = 'tag';
        tagSpan.textContent = tag;
        container.appendChild(tagSpan);
      });
    }

    // ===== Render entry list from index.json data =====
    function renderList() {
      const ul = document.getElementById('entry-list');
      ul.innerHTML = '';
      entries.forEach(entry => {
        const li = document.createElement('li');

        const meta = document.createElement('div');
        meta.className = 'entry-meta';
        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatDate(entry.date);
        meta.appendChild(dateSpan);
        renderTags(meta, entry.tags);

        const h2 = document.createElement('h2');
        const titleLink = document.createElement('a');
        titleLink.href = '#';
        titleLink.textContent = entry.title;
        titleLink.addEventListener('click', e => { e.preventDefault(); showEntry(entry.id); });
        h2.appendChild(titleLink);

        li.appendChild(meta);
        li.appendChild(h2);
        ul.appendChild(li);
      });
    }

    // ===== Show a single entry in modal (fetches the .md file for all content) =====
    async function showEntry(id) {
      // Open modal immediately with date and loading indicator
      const modalMeta = document.getElementById('modal-meta');
      modalMeta.innerHTML = '';
      const dateSpan = document.createElement('span');
      const dateForDisplay = `${id.slice(0, 4)}-${id.slice(4, 6)}-${id.slice(6, 8)}`;
      dateSpan.textContent = formatDate(dateForDisplay);
      modalMeta.appendChild(dateSpan);

      document.getElementById('modal-title').textContent = '読み込み中…';
      document.getElementById('modal-body').textContent = '';

      const overlay = document.getElementById('entry-modal');
      overlay.classList.add('is-open');
      const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarWidth + 'px';
      document.getElementById('modal-close-btn').focus();

      // Fetch the .md file and extract tags, title, and body from it.
      // .md files are static, trusted content committed to the repository.
      try {
        const res = await fetch(`diary/${id}.md`);
        if (!res.ok) throw new Error(`Failed to fetch diary/${id}.md`);
        const markdown = await res.text();

        // Strip optional YAML frontmatter and extract tags
        let content = markdown;
        let tags = [];
        const fmMatch = markdown.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
        if (fmMatch) {
          const fm = fmMatch[1];
          content = fmMatch[2];
          const tagsMatch = fm.match(/^tags:\s*\[([^\]]*)\]/m);
          if (tagsMatch) {
            tags = tagsMatch[1].split(',').map(t => t.trim()).filter(Boolean);
          }
        }

        // Extract title from the first "# " heading
        const lines = content.split('\n');
        const titleIdx = lines.findIndex(l => l.startsWith('# '));
        let title = dateForDisplay; // fallback: formatted date if no # heading found
        let bodyLines = lines.slice();
        if (titleIdx !== -1) {
          title = lines[titleIdx].replace(/^#\s+/, '');
          bodyLines.splice(titleIdx, 1);
        }
        const bodyMarkdown = bodyLines.join('\n').trim();

        // Update modal header with tags and title parsed from the .md file
        renderTags(modalMeta, tags);
        document.getElementById('modal-title').textContent = title;
        // bodyHtml is generated from trusted repository markdown content via marked
        document.getElementById('modal-body').innerHTML = marked.parse(bodyMarkdown);
      } catch (e) {
        console.error('日記の読み込みに失敗しました:', e);
        document.getElementById('modal-title').textContent = '読み込みエラー';
        document.getElementById('modal-body').textContent = '本文の読み込みに失敗しました。';
      }
    }

    // ===== Close modal =====
    function closeModal() {
      const overlay = document.getElementById('entry-modal');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    // Close modal when clicking the backdrop (outside the modal content)
    document.getElementById('entry-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // Close modal when clicking the close button
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);

    // Close modal on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    // ===== Page navigation =====
    function showPage(name) {
      ['home', 'entry', 'about'].forEach(p => {
        document.getElementById('page-' + p).classList.toggle('hidden', p !== name);
      });
      ['home', 'about'].forEach(p => {
        const nav = document.getElementById('nav-' + p);
        if (nav) nav.classList.toggle('active', p === name);
      });
    }

    // ===== Utility: format date =====
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.getFullYear() + '年' +
             (d.getMonth() + 1) + '月' +
             d.getDate() + '日';
    }

    // ===== Init: load entry manifest from diary/index.json =====
    (async function init() {
      try {
        const res = await fetch('diary/index.json');
        const manifest = await res.json();
        entries = manifest.map(item => ({
          id: item.date,
          date: `${item.date.slice(0, 4)}-${item.date.slice(4, 6)}-${item.date.slice(6, 8)}`,
          title: item.title,
          tags: item.tags || []
        }));
      } catch (e) {
        console.error('日記インデックスの読み込みに失敗しました:', e);
      }
      renderList();
    })();
  </script>

</body>
</html>
