<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テキスト日記</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S27BK7B8XS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S27BK7B8XS');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@17.0.4/marked.min.js"></script>
</head>
<body>

  <header>
    <div class="container">
      <h1>テキスト日記</h1>
      <p class="tagline">日々の記録</p>
    </div>
  </header>

  <nav>
    <a href="#" id="nav-home" class="active" onclick="showPage('home'); return false;">ホーム</a>
    <a href="#" id="nav-about" onclick="showPage('about'); return false;">このサイトについて</a>
  </nav>

  <main class="container">

    <!-- ===== Home: Entry List ===== -->
    <section id="page-home">
      <ul class="entry-list" id="entry-list"></ul>
    </section>

    <!-- ===== Entry Detail ===== -->
    <section id="page-entry" class="hidden">
      <a href="#" class="back-link" onclick="showPage('home'); return false;">日記一覧に戻る</a>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="detail-meta"></div>
          <h1 id="detail-title"></h1>
        </header>
        <div class="entry-body" id="detail-body"></div>
      </article>
    </section>

    <!-- ===== About ===== -->
    <section id="page-about" class="hidden">
      <div class="about-section">
        <h2>このサイトについて</h2>
        <p>
          これは GitHub Pages で公開しているテキスト日記サイトです。
          日常の出来事、考え、気づきを気ままに記録しています。
        </p>
        <p>
          すべての記事はシンプルなテキストで書かれており、
          読みやすさを大切にしています。
        </p>
        <p>
          サイトは静的 HTML / CSS / JavaScript のみで構成されており、
          サーバーサイドの処理は一切使用していません。
        </p>
      </div>
    </section>

  </main>

  <!-- ===== Modal ===== -->
  <div id="entry-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn" aria-label="閉じる">&times;</button>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="modal-meta"></div>
          <h1 id="modal-title"></h1>
        </header>
        <div class="entry-body" id="modal-body"></div>
      </article>
    </div>
  </div>

  <footer>
    <div class="container">
      &copy; 2026 テキスト日記
    </div>
  </footer>

  <script>
    // ===== Loaded diary entries (populated asynchronously from diary/*.md) =====
    let entries = [];

    // ===== Load and parse a single diary markdown file =====
    // Diary files are static, trusted content committed to the repository.
    async function loadDiaryFile(dateStr) {
      const res = await fetch(`diary/${dateStr}.md`);
      if (!res.ok) throw new Error(`Failed to fetch diary/${dateStr}.md`);
      const markdown = await res.text();

      // Parse optional YAML frontmatter (--- ... ---)
      let tags = [];
      let content = markdown;
      const fmMatch = markdown.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (fmMatch) {
        const fmBlock = fmMatch[1];
        content = fmMatch[2];
        const tagsLine = fmBlock.match(/^tags:\s*\[(.*)]/m);
        if (tagsLine && tagsLine[1].trim()) {
          tags = tagsLine[1].split(',').map(t => t.trim()).filter(Boolean);
        }
      }

      // Extract title from the first "# " heading line
      const lines = content.split('\n');
      let title = '';
      const bodyLines = [];
      for (const line of lines) {
        if (!title && line.startsWith('# ')) {
          title = line.slice(2).trim();
        } else {
          bodyLines.push(line);
        }
      }
      const bodyMarkdown = bodyLines.join('\n').trim();

      // Generate a plain-text excerpt (~2 lines) from the body
      const plainText = bodyMarkdown
        .replace(/^#{1,6}\s+.*/gm, '')   // strip headings
        .replace(/\*{1,2}([^*]+)\*{1,2}/g, '$1') // strip bold/italic
        .replace(/`[^`]+`/g, '')          // strip inline code
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1'); // strip links
      const excerptLines = plainText.split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0)
        .slice(0, 2)
        .join(' ')
        .slice(0, 100);

      // Convert yyyymmdd → yyyy-mm-dd for formatting
      const isoDate = `${dateStr.slice(0, 4)}-${dateStr.slice(4, 6)}-${dateStr.slice(6, 8)}`;

      // bodyHtml is generated from trusted repository content via marked
      const bodyHtml = marked.parse(bodyMarkdown);

      return {
        id: dateStr,
        date: isoDate,
        title: title || dateStr,
        tags,
        excerpt: excerptLines,
        bodyHtml
      };
    }

    // ===== Render entry list =====
    function renderTags(container, tags) {
      tags.forEach(tag => {
        const tagSpan = document.createElement('span');
        tagSpan.className = 'tag';
        tagSpan.textContent = tag;
        container.appendChild(tagSpan);
      });
    }

    function renderList() {
      const ul = document.getElementById('entry-list');
      ul.innerHTML = '';
      entries.forEach(entry => {
        const li = document.createElement('li');

        const meta = document.createElement('div');
        meta.className = 'entry-meta';
        const dateSpan = document.createElement('span');
        dateSpan.textContent = formatDate(entry.date);
        meta.appendChild(dateSpan);
        renderTags(meta, entry.tags);

        const h2 = document.createElement('h2');
        const titleLink = document.createElement('a');
        titleLink.href = '#';
        titleLink.textContent = entry.title;
        titleLink.addEventListener('click', e => { e.preventDefault(); showEntry(entry.id); });
        h2.appendChild(titleLink);

        const excerptP = document.createElement('p');
        excerptP.className = 'entry-excerpt';
        excerptP.textContent = entry.excerpt;

        const readMore = document.createElement('a');
        readMore.href = '#';
        readMore.className = 'read-more';
        readMore.textContent = '続きを読む';
        readMore.addEventListener('click', e => { e.preventDefault(); showEntry(entry.id); });

        li.appendChild(meta);
        li.appendChild(h2);
        li.appendChild(excerptP);
        li.appendChild(readMore);
        ul.appendChild(li);
      });
    }

    // ===== Show a single entry in modal =====
    // entry.bodyHtml is generated from trusted repository markdown files.
    function showEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;

      const modalMeta = document.getElementById('modal-meta');
      modalMeta.innerHTML = '';
      const dateSpan = document.createElement('span');
      dateSpan.textContent = formatDate(entry.date);
      modalMeta.appendChild(dateSpan);
      renderTags(modalMeta, entry.tags);

      document.getElementById('modal-title').textContent = entry.title;
      document.getElementById('modal-body').innerHTML = entry.bodyHtml;

      const overlay = document.getElementById('entry-modal');
      overlay.classList.add('is-open');
      const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarWidth + 'px';
      document.getElementById('modal-close-btn').focus();
    }

    // ===== Close modal =====
    function closeModal() {
      const overlay = document.getElementById('entry-modal');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    // Close modal when clicking the backdrop (outside the modal content)
    document.getElementById('entry-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // Close modal when clicking the close button
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);

    // Close modal on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    // ===== Page navigation =====
    function showPage(name) {
      ['home', 'entry', 'about'].forEach(p => {
        document.getElementById('page-' + p).classList.toggle('hidden', p !== name);
      });
      ['home', 'about'].forEach(p => {
        const nav = document.getElementById('nav-' + p);
        if (nav) nav.classList.toggle('active', p === name);
      });
    }

    // ===== Utility: format date =====
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.getFullYear() + '年' +
             (d.getMonth() + 1) + '月' +
             d.getDate() + '日';
    }

    // ===== Init: load diary entries from diary/index.json =====
    (async function init() {
      try {
        const res = await fetch('diary/index.json');
        const dates = await res.json();
        entries = await Promise.all(dates.map(loadDiaryFile));
      } catch (e) {
        console.error('日記の読み込みに失敗しました:', e);
      }
      renderList();
    })();
  </script>

</body>
</html>
