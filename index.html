<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テキスト日記</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S27BK7B8XS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S27BK7B8XS');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="container">
      <h1>テキスト日記</h1>
      <p class="tagline">日々の記録</p>
    </div>
  </header>

  <nav>
    <a href="#" id="nav-home" class="active" onclick="showPage('home'); return false;">ホーム</a>
    <a href="#" id="nav-about" onclick="showPage('about'); return false;">このサイトについて</a>
  </nav>

  <main class="container">

    <!-- ===== Home: Entry List ===== -->
    <section id="page-home">
      <ul class="entry-list" id="entry-list"></ul>
    </section>

    <!-- ===== Entry Detail ===== -->
    <section id="page-entry" class="hidden">
      <a href="#" class="back-link" onclick="showPage('home'); return false;">日記一覧に戻る</a>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="detail-meta"></div>
          <h1 id="detail-title"></h1>
        </header>
        <div class="entry-body" id="detail-body"></div>
      </article>
    </section>

    <!-- ===== About ===== -->
    <section id="page-about" class="hidden">
      <div class="about-section">
        <h2>このサイトについて</h2>
        <p>
          これは GitHub Pages で公開しているテキスト日記サイトです。
          日常の出来事、考え、気づきを気ままに記録しています。
        </p>
        <p>
          すべての記事はシンプルなテキストで書かれており、
          読みやすさを大切にしています。
        </p>
        <p>
          サイトは静的 HTML / CSS / JavaScript のみで構成されており、
          サーバーサイドの処理は一切使用していません。
        </p>
      </div>
    </section>

  </main>

  <!-- ===== Modal ===== -->
  <div id="entry-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn" aria-label="閉じる">&times;</button>
      <article>
        <header class="entry-header">
          <div class="entry-meta" id="modal-meta"></div>
          <h1 id="modal-title"></h1>
        </header>
        <div class="entry-body" id="modal-body"></div>
      </article>
    </div>
  </div>

  <footer>
    <div class="container">
      &copy; 2026 テキスト日記
    </div>
  </footer>

  <script>
    // ===== Loaded diary entries =====
    let allEntries = [];

    // ===== Load entries from dialy/ JSON files =====
    async function loadEntries() {
      try {
        const indexResp = await fetch('dialy/index.json');
        if (!indexResp.ok) throw new Error('index.json の読み込みに失敗しました');
        const fileList = await indexResp.json();

        const entryPromises = fileList.map(filename =>
          fetch(`dialy/${filename}.json`).then(r => {
            if (!r.ok) throw new Error(`${filename}.json の読み込みに失敗しました`);
            return r.json();
          })
        );
        const entries = await Promise.all(entryPromises);

        // Sort by date descending (latest first)
        entries.sort((a, b) => new Date(b.date) - new Date(a.date));
        return entries;
      } catch (err) {
        console.error('記事の読み込みエラー:', err);
        document.getElementById('entry-list').innerHTML =
          '<li style="padding:1.5rem 0;color:#888;">記事を読み込めませんでした。</li>';
        return [];
      }
    }

    // ===== Render entry list =====
    function renderList(entries) {
      const ul = document.getElementById('entry-list');
      ul.innerHTML = '';
      entries.forEach(entry => {
        const tagsHtml = entry.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(' ');
        const li = document.createElement('li');
        // entry.date is a trusted ISO date string (yyyy-mm-dd) from our own JSON files
        const dateAttr = entry.date;
        li.innerHTML = `
          <div class="entry-meta">
            <span>${formatDate(dateAttr)}</span>
            ${tagsHtml}
          </div>
          <h2><a href="#" onclick="showEntry('${dateAttr}'); return false;">${escapeHtml(entry.title)}</a></h2>
          <p class="entry-excerpt">${escapeHtml(entry.excerpt)}</p>
          <a href="#" class="read-more" onclick="showEntry('${dateAttr}'); return false;">続きを読む</a>
        `;
        ul.appendChild(li);
      });
    }

    // ===== Show a single entry in modal =====
    // Note: entry.body is trusted HTML from static JSON files in the repository.
    // title, tags, and excerpt are escaped before use. No user input is written via innerHTML.
    function showEntry(dateStr) {
      const entry = allEntries.find(e => e.date === dateStr);
      if (!entry) return;

      const tagsHtml = entry.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(' ');
      document.getElementById('modal-meta').innerHTML =
        `<span>${formatDate(entry.date)}</span>${tagsHtml}`;
      document.getElementById('modal-title').textContent = entry.title;
      document.getElementById('modal-body').innerHTML = entry.body;

      const overlay = document.getElementById('entry-modal');
      overlay.classList.add('is-open');
      const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarWidth + 'px';
      document.getElementById('modal-close-btn').focus();
    }

    // ===== Utility: escape HTML special characters =====
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ===== Close modal =====
    function closeModal() {
      const overlay = document.getElementById('entry-modal');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    // Close modal when clicking the backdrop (outside the modal content)
    document.getElementById('entry-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // Close modal when clicking the close button
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);

    // Close modal on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    // ===== Page navigation =====
    function showPage(name) {
      ['home', 'entry', 'about'].forEach(p => {
        document.getElementById('page-' + p).classList.toggle('hidden', p !== name);
      });
      ['home', 'about'].forEach(p => {
        const nav = document.getElementById('nav-' + p);
        if (nav) nav.classList.toggle('active', p === name);
      });
    }

    // ===== Utility: format date =====
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.getFullYear() + '年' +
             (d.getMonth() + 1) + '月' +
             d.getDate() + '日';
    }

    // ===== Init =====
    loadEntries().then(entries => {
      allEntries = entries;
      renderList(allEntries);
    });
  </script>

</body>
</html>
